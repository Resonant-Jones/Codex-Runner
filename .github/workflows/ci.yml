name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package and development dependencies
        run: python -m pip install -e '.[dev,tui]'
      - name: Import and CLI smoke checks
        run: make smoke PYTHON=python
      - name: Test suite
        run: make test PYTHON=python
